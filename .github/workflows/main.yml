name: Build VMP3-Disasm

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies ──────────────────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-suggests --no-install-recommends \
            build-essential \
            clang \
            llvm-16 \
            llvm-16-dev \
            libboost-all-dev \
            libgmp-dev \
            libmpfr-dev \
            libpython3-dev \
            ninja-build \
            pkg-config \
            python3-pip \
            cmake \
            git \
            curl \
            tar \
            unzip

      # ── Z3 dari source ───────────────────────────────────────────────────
      - name: Build and install Z3
        run: |
          git clone https://github.com/Z3Prover/z3.git /tmp/z3 --depth=1 --branch z3-4.13.0
          cmake -S /tmp/z3 -B /tmp/z3/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DZ3_BUILD_PYTHON_BINDINGS=OFF \
            -DZ3_BUILD_JAVA_BINDINGS=OFF \
            -DZ3_BUILD_DOTNET_BINDINGS=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/z3/build --parallel $(nproc)
          sudo cmake --install /tmp/z3/build
          sudo ldconfig

      # ── Capstone 5 dari source ───────────────────────────────────────────
      - name: Build and install Capstone 5
        run: |
          cd /tmp
          curl -s -o capstone-5.0.1.tar.gz -L https://github.com/aquynh/capstone/archive/5.0.1.tar.gz
          tar xf capstone-5.0.1.tar.gz
          cd capstone-5.0.1
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DCAPSTONE_BUILD_TESTS=OFF \
            -DCAPSTONE_BUILD_CSTOOL=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -GNinja
          sudo ninja -C build install
          sudo ldconfig

      # ── Triton ──────────────────────────────────────────────────────────
      - name: Build and install Triton
        run: |
          git clone https://github.com/JonathanSalwan/Triton.git /tmp/Triton --depth=1 --branch master
          cmake -S /tmp/Triton -B /tmp/triton-build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPYTHON_BINDINGS=OFF \
            -DLLVM_INTERFACE=ON \
            -DCMAKE_PREFIX_PATH=$(llvm-config-16 --prefix) \
            -DZ3_INTERFACE=ON \
            -DZ3_INCLUDE_DIRS=/usr/local/include \
            -DZ3_LIBRARIES=/usr/local/lib/libz3.so \
            -DCAPSTONE_INCLUDE_DIRS=/usr/local/include \
            -DCAPSTONE_LIBRARIES=/usr/local/lib/libcapstone.so \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          sudo ninja -C /tmp/triton-build -j$(nproc) install
          sudo ldconfig

      # ── LIEF dari source ─────────────────────────────────────────────────
      - name: Build and install LIEF
        run: |
          git clone https://github.com/lief-project/LIEF.git /tmp/LIEF --depth=1 --branch 0.14.1
          cmake -S /tmp/LIEF -B /tmp/LIEF/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIEF_PYTHON_API=OFF \
            -DLIEF_TESTS=OFF \
            -DLIEF_EXAMPLES=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/LIEF/build --parallel $(nproc)
          sudo cmake --install /tmp/LIEF/build
          sudo ldconfig

      # ── Patch CMakeLists.txt: ganti path LLVM-13 → LLVM-16 ──────────────
      - name: Patch CMakeLists.txt for LLVM 16
        run: |
          LLVM16_INC=$(llvm-config-16 --includedir)
          LLVM16_LIB=$(llvm-config-16 --libdir)
          echo "LLVM include: $LLVM16_INC"
          echo "LLVM lib:     $LLVM16_LIB"
          sed -i "s|/usr/lib/llvm-13/include|$LLVM16_INC|g" CMakeLists.txt
          sed -i "s|/usr/lib/llvm-13/lib|$LLVM16_LIB|g" CMakeLists.txt
          cat CMakeLists.txt

      # ── Build VMP3-Disasm ────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build --parallel $(nproc)

      # ── Upload artifact ──────────────────────────────────────────────────
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: vmp-disasm-linux-x64
          path: build/vmp-disasm
          if-no-files-found: error
